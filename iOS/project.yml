name: Studystreak
options:
  bundleIdPrefix: com.shimondeitel.studystreak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Studystreak:
    type: application
    platform: iOS
    sources:
      - path: Studystreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studystreak
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Studystreak/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StudystreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StudystreakTests
      - path: Studystreak.storekit
    dependencies:
      - target: Studystreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studystreak.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StudystreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StudystreakUITests
    dependencies:
      - target: Studystreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studystreak.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Studystreak:
    build:
      targets:
        Studystreak: all
        StudystreakTests: [test]
        StudystreakUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Studystreak.storekit
    test:
      config: Debug
      storeKitConfiguration: Studystreak.storekit
      targets:
        - StudystreakTests
        - StudystreakUITests
    archive:
      config: Release
